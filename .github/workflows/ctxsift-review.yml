name: CtxSift Review Bundle

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  # To enable sticky PR comments, add:
  # pull-requests: write

jobs:
  review-context:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate CtxSift review context
        uses: ./
        with:
          diff: origin/${{ github.base_ref }}...HEAD
          artifact-name: ctxsift-review-context
          comment: ${{ vars.CTXSIFT_REVIEW_COMMENT == 'true' }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
